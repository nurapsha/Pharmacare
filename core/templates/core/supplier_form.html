{% extends 'core/base.html' %}
{% block title %}{{ title }}{% endblock %}
{% block page_title %}{{ title }}{% endblock %}
{% block content %}
<div class="row justify-content-center"><div class="col-lg-6">
  <div class="table-card card">
    <div class="card-header"><i class="bi bi-truck me-2"></i>{{ title }}</div>
    <div class="card-body p-4">
      <form method="post">
        {% csrf_token %}
        <div class="row g-3">
          <div class="col-12"><label class="form-label fw-600 small">Company Name *</label>{{ form.name }}</div>
          <div class="col-md-6"><label class="form-label fw-600 small">Contact Person</label>{{ form.contact_person }}</div>
          <div class="col-md-6"><label class="form-label fw-600 small">Phone</label>{{ form.phone }}</div>
          <div class="col-12"><label class="form-label fw-600 small">Email</label>{{ form.email }}</div>
          <div class="col-12"><label class="form-label fw-600 small">Address</label>{{ form.address }}</div>
        </div>
        <div class="d-flex gap-3 mt-4">
          <button type="submit" class="btn btn-primary px-4"><i class="bi bi-check me-1"></i>Save</button>
          <a href="{% url 'supplier_list' %}" class="btn btn-outline-secondary">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div></div>
{% endblock %}
